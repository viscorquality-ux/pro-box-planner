<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            flex: 1;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        .card {
            background-color: white;
            border: 2px solid #2c3e50;
            border-radius: 5px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
            cursor: pointer;
        }
        .card:hover {
            background-color: #e9ecef;
            transform: translateY(-3px);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }
        .instruction-text {
            margin-top: 15px;
            font-size: 0.75em;
            color: #d9534f;
            font-weight: normal;
        }
        .center-card {
            grid-column: 2;
        }
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 1.1em;
            font-family: serif;
            color: #333;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid">
            <a href="/programme-plan" onclick="openPopup(event, this.href, 'ProgrammePlan')" class="card">
                Programme Plan
            </a>
            <a href="/inventory" onclick="openPopup(event, this.href, 'Inventory')" class="card">
                Inventory
            </a>
            <a href="/production-floor" onclick="openPopup(event, this.href, 'ProductionFloor')" class="card">
                Production Floor Management
            </a>

            <a href="/finished-goods" onclick="openPopup(event, this.href, 'FinishedGoods')" class="card">
                Finished goods
            </a>
            <a href="/maintenance" onclick="openPopup(event, this.href, 'Maintenance')" class="card">
                Maintenance
            </a>
            <a href="/quality" onclick="openPopup(event, this.href, 'Quality')" class="card">
                Quality
            </a>

            <a href="/third-party" onclick="openPopup(event, this.href, 'ThirdParty')" class="card center-card">
                3rd party services
            </a>
        </div>
    </div>

    <div class="footer">
        "To be the most trusted and innovative corrugated packaging solution provider in Sri Lanka."
    </div>

    <script>
        function openPopup(event, url, windowName) {
            // Normal link eka click kalama wena widihata tab eka open wena eka nawaththanawa
            event.preventDefault(); 
            
            // Popup window eke size eka
            let width = 800;
            let height = 600;
            
            // Popup eka screen eke madata (center) genna calculations
            let left = (window.screen.width / 2) - (width / 2);
            let top = (window.screen.height / 2) - (height / 2);
            
            // Popup window eka open kirima
            window.open(url, windowName, `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes`);
        }
    </script>

</body>
</html>
